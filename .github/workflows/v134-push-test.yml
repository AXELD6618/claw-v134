name: V13.4 推送测试 (Manual Test)

on:
  workflow_dispatch:
    inputs:
      test_message:
        description: "测试推送内容"
        required: false
        default: "✅ V13.4 推送通道测试\n\n这是一条测试消息，用于验证 PushPlus → 微信 推送链路是否正常。\n\n如果你能看到这条消息，说明推送功能已修复成功！\n\n时间：{{ github.event.inputs.test_message }}\n\n毕方灵犀·天眼 V13.4"

permissions:
  contents: read

jobs:
  test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Install dependencies
        run: pip install -r requirements_cloud.txt
          
      - name: Send Test Push
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          DEBUG: "1"
        run: |
          echo "🔍 Sending test push notification..."
          python cloud_notify.py --step=TEST --format=plain --debug
          
      - name: Check Debug Logs
        if: always()
        run: |
          echo "=== Debug Logs ==="
          if [ -f "cloud_outputs/notify_debug.log" ]; then
            cat cloud_outputs/notify_debug.log
          fi
          echo "=== Debug Files ==="
          ls -la cloud_outputs/debug/ 2>/dev/null || echo "No debug files"
