name: V13.4 T5 Holy Grail 1430

permissions:
  contents: write
on:
  schedule:
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements_cloud.txt
      - name: Run Holy Grail
        run: python cloud_pipeline.py --step=T5
      - name: Notify T5 via PushPlus
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_notify.py --step=T5
      - name: Commit Holy Grail Signals
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: T5 Holy Grail Signals [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          skip_dirty_check: true
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
