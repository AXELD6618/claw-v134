name: V13.4 T4 Final Confirmation 1415

permissions:
  contents: write
on:
  schedule:
    - cron: "15 6 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run T4
        run: python cloud_pipeline.py --step=T4
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: T4 Final [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          skip_dirty_check: true
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
      - name: Notify T4 via PushPlus
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python cloud_notify.py --step=T4 --data-file=cloud_state/step_T4.json
