# V13.4 T4 Final Confirmation
# Runs at 14:15 CST (06:15 UTC) Mon-Fri
# Purpose: Final 15-30 holy grail candidate pool

name: "V13.4 T4 临门一脚 14:15"

on:
  schedule:
    - cron: "15 6 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run T4 Final
        run: python cloud_pipeline.py --step=T4

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto: T4 Final Candidates [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
