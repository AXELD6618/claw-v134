name: V13.4 T0 Full Market Screener 1030

on:
  schedule:
    - cron: "30 2 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements_cloud.txt"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run T0
        run: python cloud_pipeline.py --step=T0
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: T0 Screener [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
