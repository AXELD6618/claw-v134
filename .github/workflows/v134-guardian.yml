name: V13.4 Guardian Health Check

permissions:
  contents: write
  actions: write
on:
  schedule:
    - cron: "*/15 * * * 1-5"
  workflow_dispatch:
  push:
    paths:
      - "cloud_pipeline.py"
      - ".github/workflows/v134-guardian.yml"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Guardian
        env:
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_pipeline.py --step=GUARDIAN
      - name: Self-Healing Dispatch (Reliable API Method)
        id: dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: |
          echo "🔄 Self-healing dispatch triggered"
          python self_heal_dispatch.py
          echo "dispatched=$?" >> "$GITHUB_OUTPUT"
          if [ -f "cloud_outputs/dispatch_result.json" ]; then
            cat cloud_outputs/dispatch_result.json
          fi
      - name: Commit status
        continue-on-error: true
        run: |
          git config user.name "BifangLingxi Bot"
          git config user.email "bifang.lingxi@claw.ai"
          git add cloud_outputs/ cloud_state/ cloud_cache/ 2>/dev/null || true
          git commit -m "Auto: Guardian Health Check [skip ci]" 2>/dev/null || echo "No changes to commit"
          git push 2>/dev/null || echo "Push skipped"
      - name: Notify Guardian Alert (if degraded)
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_notify.py --step=GUARDIAN --data-file=cloud_state/step_GUARDIAN.json --format=plain
