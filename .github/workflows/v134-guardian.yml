name: V13.4 Guardian Health Check

permissions:
  contents: write
on:
  schedule:
    - cron: "*/15 * * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Guardian
        run: python cloud_pipeline.py --step=GUARDIAN
      - name: Commit status
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Guardian Health Check [skip ci]"
          file_pattern: "cloud_state/* cloud_outputs/*"
          skip_dirty_check: true
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
      - name: Notify Guardian Alert (if degraded)
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python cloud_notify.py --step=GUARDIAN --data-file=cloud_state/step_GUARDIAN.json
