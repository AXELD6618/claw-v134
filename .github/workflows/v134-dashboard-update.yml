name: V13.4 Dashboard Update

on:
  schedule:
    # Every 30 minutes during A-share trading hours (09:00-15:30 CST = 01:00-07:30 UTC)
    - cron: '0 1,2,3,4,5,6,7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run Guardian Check
        env:
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_pipeline.py --step=GUARDIAN

      - name: Commit Dashboard Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Dashboard: guardian update [skip ci]"
          file_pattern: "cloud_outputs/guardian_health.json cloud_state/step_GUARDIAN.json"
          skip_dirty_check: true
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
