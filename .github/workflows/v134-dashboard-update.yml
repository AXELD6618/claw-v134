name: V13.4 Dashboard Update

on:
  schedule:
    # Every 30 minutes during A-share trading hours (09:00-15:30 CST = 01:00-07:30 UTC)
    - cron: '0 1,2,3,4,5,6,7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run Guardian Check
        env:
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_pipeline.py --step=GUARDIAN

      - name: Commit Dashboard Data
        continue-on-error: true
        run: |
          git config user.name "BifangLingxi Bot"
          git config user.email "bifang.lingxi@claw.ai"
          git add cloud_outputs/ cloud_state/ cloud_cache/ 2>/dev/null || true
          git commit -m "Dashboard: guardian update [skip ci]" 2>/dev/null || echo "No changes to commit"
          git push 2>/dev/null || echo "Push skipped"
