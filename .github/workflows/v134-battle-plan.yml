name: V13.4 Battle Plan 2200

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements_cloud.txt"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run Battle Plan
        run: python cloud_pipeline.py --step=BATTLE
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Battle Plan [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
