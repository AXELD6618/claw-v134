name: V13.4 Battle Plan 2200

permissions:
  contents: write
on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run Battle Plan
        run: python cloud_pipeline.py --step=BATTLE
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Battle Plan [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          skip_dirty_check: true
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
      - name: Notify Battle Plan via PushPlus
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_notify.py --step=BATTLE --data-file=cloud_state/step_BATTLE.json
