# V13.4 Battle Plan
# Runs at 22:00 CST (14:00 UTC) Mon-Fri
# Purpose: Tomorrow's battle plan — watchlist, allocation, strategy

name: "V13.4 明日作战计划 22:00"

on:
  schedule:
    - cron: "0 14 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run Battle Plan
        run: python cloud_pipeline.py --step=BATTLE

      - name: Commit Battle Plan
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "⚔️ Auto: Battle Plan [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
