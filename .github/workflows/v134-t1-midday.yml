name: V13.4 T1 Midday Refresh 1130

permissions:
  contents: write
on:
  schedule:
    - cron: "30 3 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run T1
        env:
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_pipeline.py --step=T1
      - name: Commit results
        continue-on-error: true
        run: |
          git config user.name "BifangLingxi Bot"
          git config user.email "bifang.lingxi@claw.ai"
          git add cloud_outputs/ cloud_state/ cloud_cache/ 2>/dev/null || true
          git commit -m "Auto: T1 Midday [skip ci]" 2>/dev/null || echo "No changes to commit"
          git push 2>/dev/null || echo "Push skipped"
      - name: Notify T1 via PushPlus
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_notify.py --step=T1 --data-file=cloud_state/step_T1.json
