name: V13.4 Night Analysis 2000

permissions:
  contents: write
on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run Night
        env:
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_pipeline.py --step=NIGHT
      - name: Commit results
        continue-on-error: true
        run: |
          git config user.name "BifangLingxi Bot"
          git config user.email "bifang.lingxi@claw.ai"
          git add cloud_outputs/ cloud_state/ cloud_cache/ 2>/dev/null || true
          git commit -m "Auto: Night Analysis [skip ci]" 2>/dev/null || echo "No changes to commit"
          git push 2>/dev/null || echo "Push skipped"
      - name: Notify Night via PushPlus
        if: always()
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PYTHONIOENCODING: utf-8
          LANG: C.UTF-8
        run: python cloud_notify.py --step=NIGHT --data-file=cloud_state/step_NIGHT.json --format=plain
