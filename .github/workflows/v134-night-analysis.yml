name: V13.4 Night Analysis 2000

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements_cloud.txt
      - name: Run Night
        run: python cloud_pipeline.py --step=NIGHT
      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto: Night Analysis [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/* cloud_cache/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
