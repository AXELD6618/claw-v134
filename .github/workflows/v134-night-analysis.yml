# V13.4 Night Analysis
# Runs at 20:00 CST (12:00 UTC) Mon-Fri
# Purpose: End-of-day review, backtest, calibration

name: "V13.4 夜间深度分析 20:00"

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_cloud.txt

      - name: Run Night Analysis
        run: python cloud_pipeline.py --step=NIGHT

      - name: Commit results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🌙 Auto: Night Analysis [skip ci]"
          file_pattern: "cloud_outputs/* cloud_state/*"
          commit_user_name: "BifangLingxi Bot"
          commit_user_email: "bifang.lingxi@claw.ai"
